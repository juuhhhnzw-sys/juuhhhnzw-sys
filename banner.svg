<svg width="800" height="180" viewBox="0 0 800 180" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill: #0d1117; }

    .terminal {
      fill: #00ff00;
      font-family: monospace;
      font-size: 18px;
    }

    .html-text {
      color: #00ff00;
      font-family: monospace;
      font-size: 18px;
    }

    .line {
      overflow: hidden;
      white-space: nowrap;
      border-right: 2px solid #00ff00;
      width: 0;
    }

    .line1 {
      animation: typing1 2s steps(40, end) infinite;
    }

    .line2 {
      animation: typing2 2s steps(40, end) infinite;
    }

    .line3 {
      animation: typing3 2s steps(40, end) infinite;
    }

    @keyframes typing1 {
      0% { width: 0 }
      20% { width: 400px }
      33% { width: 400px }
      34% { width: 0 }
      100% { width: 0 }
    }

    @keyframes typing2 {
      0% { width: 0 }
      33% { width: 0 }
      53% { width: 400px }
      66% { width: 400px }
      67% { width: 0 }
      100% { width: 0 }
    }

    @keyframes typing3 {
      0% { width: 0 }
      66% { width: 0 }
      86% { width: 400px }
      100% { width: 400px }
    }
  </style>

  <rect class="bg" width="100%" height="100%" />

  <!-- Prompt -->
  <text x="20" y="40" class="terminal">&gt; juliano@dev:~$</text>

  <!-- Typing lines -->
  <foreignObject x="20" y="70" width="760" height="100">
    <div xmlns="http://www.w3.org/1999/xhtml" class="html-text">
      <div class="line line1">scanning endpoints...</div>
      <div class="line line2">enumerating services...</div>
      <div class="line line3">testing input validation...</div>
    </div>
  </foreignObject>
</svg>
